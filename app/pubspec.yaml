name: rural_tourism_app
description: Hybrid rural tourism guide with offline exploration and AI backend recommendations.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  http: ^1.2.0
  shared_preferences: ^2.2.3
  flutter_map_mbtiles: ^1.0.4
  flutter_riverpod: ^3.3.1
  sentry_flutter: ^9.0.0
  posthog_flutter: ^5.24.2
  intl: ^0.20.2
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.3
  connectivity_plus: ^7.1.1
  share_plus: ^12.0.2
  flutter_dotenv: ^5.1.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/data/
    - assets/images/pokhara.png
    - assets/images/pokhara_hero.webp
    - assets/images/cat_trekking.jpg
    - assets/images/cat_cultural.jpg
    - assets/images/cat_nature.jpg
    - assets/images/cat_village.jpg
    - assets/images/cat_wildlife.jpg
    - assets/images/cat_boating.jpg
    - assets/images/cat_spiritual.jpg
    - assets/images/cat_relaxation.jpg
    - assets/animations/
    - assets/maps/

  fonts:
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-VariableFont_wght.ttf
          weight: 100
          style: normal
