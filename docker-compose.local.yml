services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nepal-tourism-backend
    env_file:
      - ./backend/.env
    environment:
      INTERACTION_STORAGE_BACKEND: sqlite
      REDIS_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
