services:
  postgres:
    image: postgres:16-alpine
    container_name: nepal-tourism-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nepal_tourism
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nepal_tourism"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nepal-tourism-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nepal-tourism-backend
    restart: on-failure
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      INTERACTION_STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nepal_tourism
      REDIS_URL: redis://redis:6379
      APP_DB_FILE: data/app.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - backend_models:/app/models
    # To pre-fetch all destination images run:
    # docker compose exec backend python backend/scripts/fetch_destination_images.py
    # To generate bundled offline destination photos run:
    # docker compose exec backend python backend/scripts/download_destination_images.py
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  image-prefetch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nepal-tourism-image-prefetch
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "
        if [ ! -f /app/data/destination_images.json ]; then
          echo 'Fetching destination images...' &&
          python backend/scripts/fetch_destination_images.py &&
          echo 'Image fetch complete.';
        else
          echo 'destination_images.json already exists, skipping fetch.';
        fi
      "
    volumes:
      - ./data:/app/data
    restart: "no"

volumes:
  postgres_data:
  backend_models:
